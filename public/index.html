<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Control Electoral Sucre</title>
    <!-- Tailwind CDN for 100% reliable layout in development -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0A192F',
                            gold: '#D4AF37',
                            light: '#F8FAFC',
                            white: '#FFFFFF'
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'float': '0 20px 40px -15px rgba(0,0,0,0.05)',
                        'glow': '0 0 20px rgba(212, 175, 55, 0.3)'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>
<body class="bg-brand-light font-sans text-brand-navy min-h-screen flex items-center justify-center p-4">

    <!-- Ambient background gradient -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -right-[10%] w-[70%] h-[70%] rounded-full bg-brand-gold/5 blur-[120px]"></div>
        <div class="absolute -bottom-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-blue-500/5 blur-[100px]"></div>
    </div>

    <!-- Login Card -->
    <div class="relative z-10 w-full max-w-md bg-white rounded-[32px] shadow-float p-10 md:p-12 border border-slate-100">
        <!-- Logo Header -->
        <div class="text-center mb-10">
            <div class="w-20 h-20 mx-auto bg-brand-navy rounded-[24px] flex items-center justify-center mb-6 shadow-lg shadow-brand-navy/20">
                <img src="https://lh3.googleusercontent.com/a/ACg8ocIs_cO7sP_TDE1Vl2FhW3D0_15t79HkPjFhR6l1X0I_pA=s96-c" alt="Logo" class="w-12 h-12 rounded-xl object-cover" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjRDhCMzRFIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTEyIDJMMiA3bDEwIDUgMTAtNS0xMC01ek0yIDE3bDEwIDUgMTAtNU0yIDEybDEwIDUgMTAtNSIvPjwvc3ZnPg=='" />
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-brand-navy">Defensores de la Patria</h1>
            <p class="text-slate-500 text-sm mt-2">Plataforma de Control Electoral</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <div id="error-message" class="hidden bg-red-50 text-red-600 p-4 rounded-2xl text-sm font-medium border border-red-100 flex items-center gap-3">
                <span class="material-symbols-outlined text-red-500">error</span>
                <span id="error-text">Credenciales inválidas</span>
            </div>

            <!-- Email or Cedula Input -->
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Cédula o Correo Electrónico</label>
                <div class="flex items-center gap-3 px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus-within:bg-white focus-within:border-brand-gold focus-within:ring-4 focus-within:ring-brand-gold/10 transition-all">
                    <span class="material-symbols-outlined text-slate-400">person</span>
                    <input type="text" id="email" required placeholder="Ej: 1102837465 o admin@electoral" 
                           class="w-full bg-transparent border-none outline-none text-brand-navy placeholder-slate-400 font-medium">
                </div>
            </div>

            <!-- Password Input -->
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Contraseña</label>
                <div class="flex items-center gap-3 px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus-within:bg-white focus-within:border-brand-gold focus-within:ring-4 focus-within:ring-brand-gold/10 transition-all">
                    <span class="material-symbols-outlined text-slate-400">lock</span>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="w-full bg-transparent border-none outline-none text-brand-navy placeholder-slate-400 font-medium tracking-widest">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" 
                    class="w-full bg-brand-navy hover:bg-slate-800 text-white font-semibold py-4 rounded-2xl transition-all shadow-lg hover:shadow-xl flex items-center justify-center gap-2 group mt-8">
                <span>Ingresar al Sistema</span>
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </button>
        </form>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const btn = document.getElementById('submitBtn');

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span><span>Verificando...</span>';
                
                const response = await api.auth.login(email, password);
                
                if (response.success) {
                    if (response.user.rol === 'Testigo_Electoral') {
                        window.location.href = '/testigo-portal.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    errorText.textContent = response.message || 'Error al iniciar sesión';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorText.textContent = 'No se pudo conectar al servidor';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Ingresar al Sistema</span><span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>';
            }
        });
    </script>
</body>
</html>
